name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip==26.1.2
      - run: python -m pip install --require-hashes -r requirements.lock
      - run: python -m pip install --no-deps -e .
      - run: python -m ruff check .
      - run: python -m pytest
      - run: >-
          python -m evaluation.run_offline
          --output artifacts/deterministic-${{ matrix.os }}.json
      - run: python -m project_copilot.release_guard .
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: deterministic-evaluation-${{ matrix.os }}
          path: artifacts/deterministic-${{ matrix.os }}.json

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip==26.1.2
      - run: python -m pip install --require-hashes -r requirements.runtime.lock
      - run: python -m pip install --no-deps -e .
      - run: >-
          python -m pip install build==1.5.0 pip-audit==2.10.1
          cyclonedx-bom==7.3.0 licensecheck==2026.0.8
      - run: python -m pip_audit -r requirements.runtime.lock --strict
      - run: >-
          licensecheck --license apache --zero --format json
          --file license-report.json
      - run: python -m build
      - run: python scripts/verify_distribution_contents.py dist
      - run: python -m venv wheel-smoke
      - run: wheel-smoke/bin/python -m pip install --upgrade pip==26.1.2
      - run: wheel-smoke/bin/python -m pip install --require-hashes -r requirements.runtime.lock
      - run: wheel-smoke/bin/python -m pip install --no-deps dist/*.whl
      - run: >-
          wheel-smoke/bin/python -c "from fastapi.testclient import TestClient;
          from project_copilot.web import create_app;
          import pathlib, tempfile;
          response=TestClient(create_app(runtime_root=pathlib.Path(tempfile.gettempdir())/'wheel-smoke')).get('/api/health');
          assert response.status_code == 200, response.text;
          assert response.json()['project_id'] == 'synthetic-hvac-demo'"
      - run: >-
          cyclonedx-py environment wheel-smoke/bin/python --pyproject pyproject.toml
          --mc-type application --output-reproducible --output-format JSON
          --output-file sbom.cdx.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: package-and-sbom
          path: |
            dist/*
            sbom.cdx.json
            license-report.json

  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --require-hashes -r requirements.lock
      - run: python -m pip install --no-deps -e .
      - run: python -m playwright install --with-deps chromium
      - run: |
          python -m project_copilot --port 8788 > server.log 2>&1 &
          python - <<'PY'
          import time
          import httpx
          for _ in range(60):
              try:
                  if httpx.get("http://127.0.0.1:8788/api/health").status_code == 200:
                      break
              except httpx.HTTPError:
                  time.sleep(1)
          else:
              raise SystemExit("server did not start")
          PY
      - run: python -m pytest tests/test_browser_acceptance.py
        env:
          PROJECT_COPILOT_BROWSER_URL: http://127.0.0.1:8788
          PROJECT_COPILOT_SCREENSHOT_DIR: artifacts
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: browser-acceptance
          path: artifacts/*

  documents:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip==26.1.2
      - name: Validate the hash-locked connected-builder toolchain
        run: >-
          python -m pip --isolated download
          --only-binary=:all:
          --require-hashes -r requirements.build.lock
          --dest artifacts/build-tools
      - run: python -m pip install --require-hashes -r requirements.documents-ci.lock
      - run: python -m pip check
      - run: python -m pip install --no-deps -e .
      - name: Prefetch the exact offline assets used by the smoke test
        run: >-
          python scripts/prefetch_docling_assets.py
          --artifacts-dir artifacts/docling-models
          --tokenizer-dir artifacts/docling-tokenizer
      - name: Run with network-backed model lookup disabled
        run: python -m pytest tests/test_docling_integration.py -q
        env:
          DOCLING_ARTIFACTS_PATH: artifacts/docling-models
          HF_HUB_OFFLINE: "1"
          OMP_NUM_THREADS: "2"
          PROJECT_COPILOT_DOCLING_ARTIFACTS_PATH: artifacts/docling-models
          PROJECT_COPILOT_DOCLING_TOKENIZER_PATH: artifacts/docling-tokenizer
          PROJECT_COPILOT_RUN_DOCLING_INTEGRATION: "1"
          TRANSFORMERS_OFFLINE: "1"

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
